name: Update hits graph

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate graph
        run: node scripts/update_hits_graph.js

      - name: Commit graph
        run: |
          if git diff --quiet -- assets/hits-graph.svg; then
            echo "Graph is already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/hits-graph.svg
          git commit -m "Update README hits graph"
          git push
